services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-jps
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: jps-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - cassandra-data:/var/lib/cassandra

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    command: >
      cqlsh cassandra -e
      "CREATE KEYSPACE IF NOT EXISTS rastreio
       WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
    restart: on-failure

volumes:
  cassandra-data:
